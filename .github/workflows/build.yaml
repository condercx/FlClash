name: build

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --reporter expanded

  build:
    needs: [ test ]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: Windows-2022
            arch: amd64
          - platform: linux
            os: ubuntu-latest
            arch: amd64
          - platform: linux
            os: ubuntu-latest
            arch: arm64
          - platform: macos
            os: macos-latest
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        if: ${{ matrix.platform == 'android' }}
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Sync Clash.Meta go modules
        working-directory: ./core/Clash.Meta
        run: go mod tidy

      - name: Sync core go modules
        working-directory: ./core
        run: go mod tidy

      - name: Build Clash Meta For Android
        working-directory: ./core/Clash.Meta
        run: make android-arm64
        if: ${{ matrix.platform == 'android' }}

      - name: Build Clash Meta For Windows
        working-directory: ./core/Clash.Meta
        run: make windows-amd64-v3
        if: ${{ matrix.platform == 'windows' }}

      - name: Build Clash Meta For Linux
        working-directory: ./core/Clash.Meta
        run: make linux-amd64-v3
        if: ${{ matrix.platform == 'linux' && matrix.arch == 'amd64' }}

      - name: Build Clash Meta For Linux ARM64
        working-directory: ./core/Clash.Meta
        run: make linux-arm64
        if: ${{ matrix.platform == 'linux' && matrix.arch == 'arm64' }}

      - name: Build Clash Meta For macOS
        working-directory: ./core/Clash.Meta
        run: make darwin-arm64
        if: ${{ matrix.platform == 'macos' }}

      - name: Build Flutter Android
        run: flutter build apk --release --split-per-abi
        if: ${{ matrix.platform == 'android' }}

      - name: Build Flutter Windows
        run: flutter build windows --release
        if: ${{ matrix.platform == 'windows' }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev libayatana-appindicator3-dev libkeybinder-3.0-dev
        if: ${{ matrix.platform == 'linux' }}

      - name: Build Flutter Linux
        run: flutter build linux --release
        if: ${{ matrix.platform == 'linux' }}

      - name: Build Flutter macOS
        run: flutter build macos --release
        if: ${{ matrix.platform == 'macos' }}

      - name: Collect artifacts
        run: |
          mkdir -p ./dist
          # Android APKs
          ls build/app/outputs/flutter-apk/*.apk 2>/dev/null && cp build/app/outputs/flutter-apk/*.apk ./dist/ || true
          # Clash Meta binary
          ls core/Clash.Meta/bin/* 2>/dev/null && cp core/Clash.Meta/bin/* ./dist/ || true
          # Windows
          ls build/windows/runner/Release/*.exe 2>/dev/null && cp build/windows/runner/Release/*.exe ./dist/ || true
          # Linux
          ls build/linux/x64/release/bundle 2>/dev/null && cp -r build/linux/x64/release/bundle ./dist/ || true
          ls build/linux/arm64/release/bundle 2>/dev/null && cp -r build/linux/arm64/release/bundle ./dist/ || true
          # macOS
          ls build/macos/Build/Products/Release/*.app 2>/dev/null && cp -r build/macos/Build/Products/Release/*.app ./dist/ || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist/
          overwrite: true

  upload:
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          tags=($(git tag --merged HEAD --sort=-creatordate))
          preTag=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | sed -nE 's/.*"tag_name": "([^"]+)".*/\1/p')
          [ -z "$preTag" ] && preTag=""
          out="release.md"
          > "$out"
          for ((i = 0; i <= ${#tags[@]}; i++)); do
            if (( i < ${#tags[@]} )); then
              tag=${tags[$i]}
            else
              tag=""
            fi
            if [ -n "$currentTag" ]; then
              if [ "$(echo -e "$currentTag\n$preTag" | sort -V | head -n 1)" == "$currentTag" ]; then
                break
              fi
            fi
            if [ -n "$currentTag" ]; then
              if [ -n "$tag" ]; then
                git log --pretty=format:"%B" "$tag..$currentTag" | awk 'NF {print "- " $0} !NF {print ""}' >> "$out"
              else
                git log --pretty=format:"%B" "$currentTag" | awk 'NF {print "- " $0} !NF {print ""}' >> "$out"
              fi
              echo "" >> "$out"
            fi
            currentTag=$tag
          done

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          sed "s|VERSION|$version|g" ./.github/release_template.md >> release.md

      - name: Generate sha256
        run: |
          cd ./dist
          find . -type f -exec sha256sum {} \; > SHA256SUMS

      - name: Release to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body_path: './release.md'
