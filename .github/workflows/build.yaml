name: build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: Windows-2022
            arch: amd64
          - platform: linux
            os: ubuntu-latest
            arch: amd64
          - platform: linux
            os: ubuntu-latest
            arch: arm64
          - platform: macos
            os: macos-latest
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JAVA
        if: ${{ matrix.platform == 'android' }}
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Get Flutter Dependency
        run: flutter pub get

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Sync go modules
        working-directory: ./core/Clash.Meta
        run: go mod tidy

      - name: Sync core go modules
        working-directory: ./core
        run: go mod tidy

      - name: Build Clash Meta
        working-directory: ./core/Clash.Meta
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            android) make android-arm64 ;;
            windows) make windows-amd64-v3 ;;
            linux)
              case "${{ matrix.arch }}" in
                amd64) make linux-amd64-v3 ;;
                arm64) make linux-arm64 ;;
              esac
              ;;
            macos) make darwin-arm64 ;;
          esac

      - name: Setup (Flutter build + packaging)
        run: dart setup.dart ${{ matrix.platform }}

      - name: Copy mihomo binary to dist
        shell: bash
        run: |
          cp core/Clash.Meta/bin/* ./dist/ 2>/dev/null || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true

  upload:
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          tags=($(git tag --merged HEAD --sort=-creatordate))
          preTag=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | sed -nE 's/.*"tag_name": "([^"]+)".*/\1/p')
          [ -z "$preTag" ] && preTag=""
          out="release.md"
          currentTag=""
          > "$out"
          for ((i = 0; i <= ${#tags[@]}; i++)); do
            if (( i < ${#tags[@]} )); then
              tag=${tags[$i]}
            else
              tag=""
            fi
            if [ -n "$currentTag" ]; then
              if [ "$(echo -e "$currentTag\n$preTag" | sort -V | head -n 1)" == "$currentTag" ]; then
                break
              fi
            fi
            if [ -n "$currentTag" ]; then
              if [ -n "$tag" ]; then
                git log --pretty=format:"%B" "$tag..$currentTag" | awk 'NF {print "- " $0} !NF {print ""}' >> "$out"
              else
                git log --pretty=format:"%B" "$currentTag" | awk 'NF {print "- " $0} !NF {print ""}' >> "$out"
              fi
              echo "" >> "$out"
            fi
            currentTag=$tag
          done

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          sed "s|VERSION|$version|g" ./.github/release_template.md >> release.md

      - name: Generate sha256
        run: |
          cd ./dist
          find . -type f -exec sha256sum {} \; > SHA256SUMS

      - name: Release to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body_path: './release.md'
