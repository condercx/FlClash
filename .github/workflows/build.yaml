name: build

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --reporter expanded

  build:
    needs: [ test ]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: Windows-2022
            arch: amd64
          - platform: linux
            os: ubuntu-latest
            arch: amd64
          - platform: linux
            os: ubuntu-latest
            arch: arm64
          - platform: macos
            os: macos-latest
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        if: ${{ matrix.platform == 'android' }}
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Sync Clash.Meta go modules
        working-directory: ./core/Clash.Meta
        run: go mod tidy

      - name: Sync core go modules
        working-directory: ./core
        run: go mod tidy

      - name: Build Clash Meta For Android
        working-directory: ./core/Clash.Meta
        run: make android-arm64
        if: ${{ matrix.platform == 'android' }}

      - name: Build Clash Meta For Windows
        working-directory: ./core/Clash.Meta
        run: make windows-amd64-v3
        if: ${{ matrix.platform == 'windows' }}

      - name: Build Clash Meta For Linux
        working-directory: ./core/Clash.Meta
        run: make linux-${{ matrix.arch }}-v3
        if: ${{ matrix.platform == 'linux' }}

      - name: Build Clash Meta For macOS
        working-directory: ./core/Clash.Meta
        run: make darwin-${{ matrix.arch == 'amd64' && 'amd64-v3' || 'arm64' }}
        if: ${{ matrix.platform == 'macos' }}

      - name: Build Flutter Android
        run: flutter build apk --release --split-per-abi
        if: ${{ matrix.platform == 'android' }}

      - name: Build Flutter Windows
        run: flutter build windows --release
        if: ${{ matrix.platform == 'windows' }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libstdc++-12-dev
        if: ${{ matrix.platform == 'linux' }}

      - name: Build Flutter Linux
        run: flutter build linux --release
        if: ${{ matrix.platform == 'linux' }}

      - name: Build Flutter macOS
        run: flutter build macos --release
        if: ${{ matrix.platform == 'macos' }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/windows/runner/Release/**
            build/linux/x64/release/**
            build/linux/arm64/release/**
            build/macos/Build/Products/Release/**
            core/Clash.Meta/bin/**

  upload:
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          tags=$(git tag --merged HEAD --sort=-creatordate)
          preTag=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | sed -nE 's/.*"tag_name": "([^"]+)".*/\1/p')
          [ -z "$preTag" ] && preTag=""
          out="release.md"
          > "$out"
          for i in "${!tags[@]}"; do
            curr="${tags[i]}"
            [[ "$curr" == "$preTag" ]] && break
            prev="${tags[i+1]}"
            range="${prev:+$prev..}$curr"
            git log --no-merges --pretty=format:"%B" "$range" | awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$out"
          done

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          sed "s|VERSION|$version|g" ./.github/release_template.md >> release.md

      - name: Generate sha256
        run: |
          cd ./dist
          sha256sum * > SHA256SUMS

      - name: Release to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body_path: './release.md'
